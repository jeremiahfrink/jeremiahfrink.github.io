<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>ISTELive 26 · Dell Strategist Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#00447C; --blue:#0672CB; --gray:#5A6B7C;
  --ink:#15202B; --muted:#5A6B7C; --line:#E4E9EF;
  --bg:#F4F7FA; --surface:#FFFFFF; --surface-2:#F8FAFC;
  --shadow:0 1px 2px rgba(21,32,43,.06), 0 8px 24px rgba(21,32,43,.06);
  --disp:'Space Grotesk',system-ui,sans-serif;
  --body:'Inter',system-ui,-apple-system,sans-serif;
  --navh:64px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--body); color:var(--ink); background:var(--bg);
  -webkit-font-smoothing:antialiased; line-height:1.45;
}
button{font-family:inherit; cursor:pointer}
a{color:var(--blue); text-decoration:none}
a:focus-visible,button:focus-visible,input:focus-visible{outline:2px solid var(--blue); outline-offset:2px}

/* ---------- GATE ---------- */
#gate{
  position:fixed; inset:0; z-index:100; background:var(--navy);
  display:flex; align-items:center; justify-content:center; padding:24px;
  color:#fff;
}
#gate .box{width:100%; max-width:340px; text-align:center}
#gate .kicker{font-family:var(--disp); letter-spacing:.18em; font-size:11px; text-transform:uppercase; color:#9ec3e8; margin-bottom:14px}
#gate h1{font-family:var(--disp); font-weight:700; font-size:30px; margin:0 0 4px; line-height:1.05}
#gate .sub{color:#bcd4ea; font-size:14px; margin-bottom:26px}
#gate input{
  width:100%; padding:14px 16px; border-radius:12px; border:1px solid #2b6098;
  background:#0a3a66; color:#fff; font-size:16px; text-align:center; margin-bottom:10px;
}
#gate input::placeholder{color:#7fa6cc}
#gate button{
  width:100%; padding:14px; border-radius:12px; border:0; background:var(--blue);
  color:#fff; font-weight:600; font-size:15px;
}
#gate .err{color:#ffb4b4; font-size:13px; height:18px; margin-top:8px}

/* ---------- APP SHELL ---------- */
#app{display:none; max-width:680px; margin:0 auto; padding:0 0 calc(var(--navh) + env(safe-area-inset-bottom) + 12px)}
.topbar{
  position:sticky; top:0; z-index:30; background:rgba(244,247,250,.92);
  backdrop-filter:saturate(1.4) blur(8px); border-bottom:1px solid var(--line);
  padding:14px 18px 12px;
}
.topbar .eyebrow{font-family:var(--disp); letter-spacing:.16em; font-size:10px; text-transform:uppercase; color:var(--gray)}
.topbar h1{font-family:var(--disp); font-weight:700; font-size:19px; margin:2px 0 0; color:var(--navy)}
.topbar .meta{font-size:12.5px; color:var(--muted); margin-top:2px}

.screen{display:none; padding:16px 16px 8px; animation:fade .25s ease}
.screen.active{display:block}
@keyframes fade{from{opacity:0; transform:translateY(4px)}to{opacity:1; transform:none}}
@media (prefers-reduced-motion:reduce){.screen{animation:none}}

.section-title{font-family:var(--disp); font-weight:600; font-size:13px; letter-spacing:.04em; text-transform:uppercase; color:var(--gray); margin:22px 4px 10px}
.section-title:first-child{margin-top:4px}

/* ---------- CARDS ---------- */
.card{background:var(--surface); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow)}
.pad{padding:16px 18px}

/* ---------- NOW ---------- */
.now-hero{padding:20px 18px}
.now-day{font-family:var(--disp); font-weight:700; font-size:22px; color:var(--navy)}
.now-sub{font-size:13px; color:var(--muted); margin-top:2px}
.now-note{margin-top:12px; background:#FFF6E8; border:1px solid #F2D9A8; color:#8a5a12; border-radius:12px; padding:10px 13px; font-size:13.5px; font-weight:500}
.now-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px}
.fact{background:var(--surface-2); border:1px solid var(--line); border-radius:13px; padding:12px 13px}
.fact .l{font-family:var(--disp); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--gray)}
.fact .v{font-size:14px; font-weight:600; margin-top:3px; color:var(--ink)}
.fact.full{grid-column:1/-1}
.next-up{margin-top:14px; border-left:4px solid var(--blue); background:var(--surface-2); border-radius:0 12px 12px 0; padding:12px 14px}
.next-up .l{font-family:var(--disp); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--blue)}
.next-up .t{font-weight:600; font-size:15px; margin-top:3px}
.next-up .d{font-size:12.5px; color:var(--muted); margin-top:2px}

.countdown{padding:30px 18px; text-align:center}
.countdown .big{font-family:var(--disp); font-weight:700; font-size:54px; color:var(--navy); line-height:1}
.countdown .lab{font-family:var(--disp); letter-spacing:.16em; text-transform:uppercase; font-size:11px; color:var(--gray); margin-top:8px}
.countdown .when{font-size:14px; color:var(--muted); margin-top:14px}

.quick{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px}
.quick a{display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--line); border-radius:13px; padding:13px 14px; font-weight:600; font-size:13.5px; color:var(--navy); box-shadow:var(--shadow)}
.quick a .dot{width:8px; height:8px; border-radius:50%; background:var(--blue); flex:0 0 auto}

/* ---------- DAY TABS + FILTERS ---------- */
.daytabs{position:sticky; top:calc(var(--navh) + 0px); z-index:20; display:flex; gap:6px; background:var(--bg); padding:6px 0 10px}
.daytabs button{
  flex:1; padding:9px 0; border-radius:11px; border:1px solid var(--line); background:var(--surface);
  font-family:var(--disp); font-weight:600; font-size:13px; color:var(--gray);
}
.daytabs button.on{background:var(--navy); color:#fff; border-color:var(--navy)}
.daytabs button .dnum{display:block; font-size:10px; font-weight:500; opacity:.7; margin-top:1px}

.filters{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:6px}
.chip{
  border:1px solid var(--line); background:var(--surface); color:var(--gray);
  border-radius:999px; padding:6px 11px; font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:6px;
}
.chip .sw{width:9px; height:9px; border-radius:50%}
.chip.on{color:#fff; border-color:transparent}
.chip.mine{border-style:dashed}
.chip.mine.on{background:var(--navy); color:#fff}

.namebar{display:none; gap:8px; align-items:center; margin:8px 0 4px; flex-wrap:wrap}
.namebar.show{display:flex}
.namebar input{flex:1; min-width:140px; padding:9px 12px; border:1px solid var(--line); border-radius:10px; font-size:14px}
.namechips{display:flex; flex-wrap:wrap; gap:6px}
.namechips button{border:1px solid var(--line); background:var(--surface); border-radius:999px; padding:5px 10px; font-size:12px; color:var(--gray); font-weight:600}
.namechips button.on{background:var(--blue); color:#fff; border-color:var(--blue)}

/* ---------- SCHEDULE CARDS ---------- */
.sched{display:flex; flex-direction:column; gap:9px; margin-top:6px}
.ev{display:flex; gap:0; background:var(--surface); border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow); overflow:hidden}
.ev .bar{width:5px; flex:0 0 auto}
.ev .body{flex:1; padding:12px 14px; min-width:0}
.ev .row1{display:flex; align-items:baseline; justify-content:space-between; gap:10px}
.ev .time{font-family:var(--disp); font-weight:600; font-size:12.5px; color:var(--ink); white-space:nowrap}
.ev .stream{font-family:var(--disp); font-size:9.5px; letter-spacing:.08em; text-transform:uppercase; font-weight:600; padding:2px 7px; border-radius:6px; white-space:nowrap}
.ev .title{font-weight:600; font-size:14.5px; margin-top:5px; line-height:1.3}
.ev .where{font-size:12px; color:var(--muted); margin-top:4px}
.ev .who{font-size:12px; color:var(--gray); margin-top:2px; font-weight:500}
.ev.mine-hit{border-color:var(--blue)}
.ev .detail{display:none; margin-top:9px; padding-top:11px; border-top:1px solid var(--line)}
.ev.open .detail{display:block}
.ev .desc{font-size:13px; color:#39434d; line-height:1.5}
.ev .acts{display:flex; gap:8px; margin-top:11px; flex-wrap:wrap}
.ev .acts button, .ev .acts a{
  border:1px solid var(--line); background:var(--surface-2); border-radius:9px;
  padding:8px 12px; font-size:12.5px; font-weight:600; color:var(--navy); display:inline-flex; align-items:center; gap:6px;
}
.ev .acts button.saved{background:var(--navy); color:#fff; border-color:var(--navy)}
.ev .acts button.checked{background:#0a7d4f; color:#fff; border-color:#0a7d4f}
.ev .caret{font-size:11px; color:var(--gray); margin-top:6px; font-family:var(--disp); letter-spacing:.04em}
.empty{text-align:center; color:var(--muted); font-size:13.5px; padding:30px 10px}

/* ---------- LOGISTICS ---------- */
.lblock{margin-bottom:10px}
.venue .name{font-family:var(--disp); font-weight:600; font-size:15px; color:var(--navy)}
.venue .where{font-size:13px; color:var(--ink); margin-top:3px}
.venue .hours{font-size:12.5px; color:var(--muted); margin-top:4px}
.venue .note{font-size:12.5px; color:var(--gray); margin-top:6px; font-style:italic}
.contact{display:flex; justify-content:space-between; gap:12px; padding:11px 0; border-bottom:1px solid var(--line)}
.contact:last-child{border-bottom:0}
.contact .n{font-weight:600; font-size:14px}
.contact .r{font-size:12px; color:var(--muted); margin-top:2px}
.contact .d{font-size:12px; color:var(--blue); text-align:right; white-space:nowrap; align-self:center}
.linkrow{display:flex; align-items:center; gap:10px; padding:12px 0; border-bottom:1px solid var(--line)}
.linkrow:last-child{border-bottom:0}
.linkrow .dot{width:8px; height:8px; border-radius:50%; background:var(--blue); flex:0 0 auto}
.linkrow .lk{font-weight:600; font-size:14px}
.linkrow .nt{font-size:12px; color:var(--muted)}
.linkrow .go{margin-left:auto; color:var(--gray); font-size:18px}
details.guide{margin-top:4px}
details.guide summary{font-family:var(--disp); font-weight:600; font-size:14px; color:var(--navy); cursor:pointer; list-style:none; padding:6px 0}
details.guide summary::-webkit-details-marker{display:none}
details.guide summary::before{content:"＋ "; color:var(--blue)}
details.guide[open] summary::before{content:"－ "}
.guide h4{font-family:var(--disp); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--gray); margin:12px 0 5px}
.guide ul{margin:0; padding-left:18px; font-size:13px; color:#39434d}
.guide ul li{margin-bottom:4px}
.guide .ct{font-size:12.5px; color:var(--muted); margin-top:10px}
.note-line{font-size:13px; color:#39434d; padding:9px 0; border-bottom:1px solid var(--line)}
.note-line:last-child{border-bottom:0}

/* ---------- MY SHOW ---------- */
.myhead{padding:18px}
.myhead .hi{font-family:var(--disp); font-weight:700; font-size:21px; color:var(--navy)}
.myhead .sub{font-size:13px; color:var(--muted); margin-top:3px}
.myhead input{width:100%; margin-top:12px; padding:11px 13px; border:1px solid var(--line); border-radius:11px; font-size:15px}
.addbox{display:flex; gap:8px; margin-top:8px}
.addbox input{flex:1; padding:11px 13px; border:1px solid var(--line); border-radius:11px; font-size:14px; margin-top:0}
.addbox button{border:0; background:var(--blue); color:#fff; border-radius:11px; padding:0 16px; font-weight:600; font-size:14px}
.mygroup{font-family:var(--disp); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--gray); margin:18px 4px 8px}
.myitem{display:flex; gap:11px; align-items:flex-start; background:var(--surface); border:1px solid var(--line); border-radius:13px; box-shadow:var(--shadow); padding:12px 14px; margin-bottom:8px}
.myitem .chk{width:22px; height:22px; border-radius:7px; border:2px solid var(--line); flex:0 0 auto; margin-top:1px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:13px; background:var(--surface)}
.myitem .chk.on{background:#0a7d4f; border-color:#0a7d4f}
.myitem .mi-body{flex:1; min-width:0}
.myitem .mi-time{font-family:var(--disp); font-size:11px; color:var(--gray); font-weight:600}
.myitem .mi-title{font-weight:600; font-size:14px; margin-top:2px; line-height:1.3}
.myitem.done .mi-title{text-decoration:line-through; color:var(--muted)}
.myitem .mi-where{font-size:12px; color:var(--muted); margin-top:2px}
.myitem textarea{width:100%; margin-top:8px; border:1px solid var(--line); border-radius:9px; padding:8px 10px; font-family:inherit; font-size:12.5px; resize:vertical; min-height:34px; color:#39434d}
.myitem .rm{border:0; background:none; color:var(--gray); font-size:18px; padding:0 2px; align-self:flex-start; line-height:1}
.my-actions{display:flex; gap:8px; margin:16px 0 4px}
.my-actions button{flex:1; border:1px solid var(--line); background:var(--surface); border-radius:11px; padding:11px; font-weight:600; font-size:13px; color:var(--navy)}
.my-empty{text-align:center; color:var(--muted); font-size:13.5px; padding:26px 16px; line-height:1.6}

/* ---------- BOTTOM NAV ---------- */
.bottomnav{
  position:fixed; left:0; right:0; bottom:0; z-index:40;
  background:rgba(255,255,255,.94); backdrop-filter:blur(10px);
  border-top:1px solid var(--line); display:flex;
  padding-bottom:env(safe-area-inset-bottom);
}
.bottomnav button{
  flex:1; border:0; background:none; padding:9px 0 8px; color:var(--gray);
  display:flex; flex-direction:column; align-items:center; gap:3px; font-size:10.5px; font-weight:600;
  font-family:var(--disp); letter-spacing:.02em;
}
.bottomnav button svg{width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:1.9}
.bottomnav button.on{color:var(--navy)}
.bottomnav button.on svg{stroke:var(--blue)}
.bottomnav .badge{position:relative}
.bottomnav .badge .ct{
  position:absolute; top:-3px; right:50%; transform:translateX(16px);
  background:var(--blue); color:#fff; font-size:9px; min-width:15px; height:15px; border-radius:99px;
  display:flex; align-items:center; justify-content:center; padding:0 3px; font-weight:700;
}

@media (min-width:560px){ .now-grid{grid-template-columns:1fr 1fr 1fr} }
</style>
</head>
<body>

<!-- ===== PASSWORD GATE ===== -->
<div id="gate">
  <div class="box">
    <div class="kicker">Dell · K-12 Strategist Team</div>
    <h1>ISTELive 26</h1>
    <div class="sub">Field guide · Orlando · June 28–July 1</div>
    <input id="gate-input" type="password" placeholder="Team access code" autocomplete="off" inputmode="text">
    <button id="gate-btn">Enter</button>
    <div class="err" id="gate-err"></div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app">
  <div class="topbar">
    <div class="eyebrow">Dell K-12 · Strategist Field Guide</div>
    <h1 id="bar-title">ISTELive 26</h1>
    <div class="meta" id="bar-meta">Orlando · June 28–July 1, 2026</div>
  </div>

  <!-- NOW -->
  <section class="screen active" id="s-now"></section>

  <!-- SCHEDULE -->
  <section class="screen" id="s-sched">
    <div class="daytabs" id="daytabs"></div>
    <div class="filters" id="streamfilters"></div>
    <div class="namebar" id="namebar">
      <input id="nameinput" placeholder="Your name (filters to your sessions)" autocomplete="off">
    </div>
    <div class="namechips" id="namechips" style="margin:6px 0 2px"></div>
    <div class="sched" id="schedlist"></div>
  </section>

  <!-- LOGISTICS -->
  <section class="screen" id="s-log"></section>

  <!-- MY SHOW -->
  <section class="screen" id="s-my"></section>
</div>

<!-- ===== BOTTOM NAV ===== -->
<nav class="bottomnav" id="bottomnav" style="display:none">
  <button data-go="now" class="on">
    <svg viewBox="0 0 24 24"><path d="M12 7v5l3 2"/><circle cx="12" cy="12" r="9"/></svg>Now</button>
  <button data-go="sched">
    <svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 9h16M9 3v4M15 3v4"/></svg>Schedule</button>
  <button data-go="log">
    <svg viewBox="0 0 24 24"><path d="M12 21s-7-5.2-7-11a7 7 0 0 1 14 0c0 5.8-7 11-7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg>Logistics</button>
  <button data-go="my" class="badge">
    <span class="ct" id="myct" style="display:none">0</span>
    <svg viewBox="0 0 24 24"><path d="M9 11l2 2 4-4"/><rect x="4" y="4" width="16" height="16" rx="3"/></svg>My Show</button>
</nav>

<script src="data.js"></script>
<script>
/* ---------- tiny storage (safe in sandboxes; real on your deploy) ---------- */
const store = {
  get(k,d){ try{ const v=localStorage.getItem(k); return v==null?d:JSON.parse(v);}catch(e){return d;} },
  set(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
};
const K={name:"iste26_name", saved:"iste26_saved", checked:"iste26_checked", notes:"iste26_notes", custom:"iste26_custom"};

let state={
  name: store.get(K.name,""),
  saved: new Set(store.get(K.saved,[])),
  checked: new Set(store.get(K.checked,[])),
  notes: store.get(K.notes,{}),
  custom: store.get(K.custom,[]),
  day: "sun",
  streamOff: new Set(),     // streams toggled OFF
  mineOnly: false,
};
function persist(){
  store.set(K.name,state.name);
  store.set(K.saved,[...state.saved]);
  store.set(K.checked,[...state.checked]);
  store.set(K.notes,state.notes);
  store.set(K.custom,state.custom);
}

/* ---------- gate ---------- */
const gate=document.getElementById("gate"), app=document.getElementById("app"), nav=document.getElementById("bottomnav");
function unlock(){
  gate.style.display="none"; app.style.display="block"; nav.style.display="flex";
  try{ sessionStorage.setItem("iste26_ok","1"); }catch(e){}
  renderAll();
}
function tryUnlock(){
  const v=document.getElementById("gate-input").value.trim();
  if(v.toLowerCase()===String(ACCESS_CODE).toLowerCase()){ unlock(); }
  else{ document.getElementById("gate-err").textContent="That code didn't match. Try again."; }
}
document.getElementById("gate-btn").addEventListener("click",tryUnlock);
document.getElementById("gate-input").addEventListener("keydown",e=>{ if(e.key==="Enter") tryUnlock(); });
try{ if(sessionStorage.getItem("iste26_ok")==="1") unlock(); }catch(e){}

/* ---------- helpers ---------- */
function dayMeta(k){ return DAYS.find(d=>d.key===k); }
function todayKey(){
  const now=new Date();
  for(const d of DAYS){ if(now.toISOString().slice(0,10)===d.date) return d.key; }
  return null;
}
function mins(hhmm){ const [h,m]=hhmm.split(":").map(Number); return h*60+m; }
function matchesMine(ev){
  if(!state.name) return false;
  const n=state.name.toLowerCase();
  const who=(ev.who||"").toLowerCase();
  return who.includes(n) || who.includes("the team");
}
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

/* ---------- NOW ---------- */
function renderNow(){
  const el=document.getElementById("s-now");
  const tk=todayKey();
  const quick=`
    <div class="quick">
      <a href="#" data-go="my"><span class="dot"></span>My Show</a>
      <a href="#" data-go="sched"><span class="dot"></span>Full schedule</a>
      <a href="${LINKS[0].url}" target="_blank" rel="noopener"><span class="dot"></span>Request a meeting</a>
      <a href="${LINKS[1].url}" target="_blank" rel="noopener"><span class="dot"></span>EPCOT registration</a>
    </div>`;

  if(!tk){
    // before (or after) the show -> countdown
    const start=new Date(CONF.startISO), now=new Date();
    const after=now>new Date(CONF.endISO);
    let inner;
    if(after){
      inner=`<div class="countdown"><div class="big">✓</div><div class="lab">That's a wrap</div>
        <div class="when">Thanks for a strong show, team.</div></div>`;
    }else{
      const days=Math.max(0,Math.ceil((start-now)/86400000));
      inner=`<div class="countdown"><div class="big">${days}</div>
        <div class="lab">${days===1?"day":"days"} to ISTELive</div>
        <div class="when">Sunday, June 28 · Orange County Convention Center, Orlando</div></div>`;
    }
    el.innerHTML=`<div class="card">${inner}</div>${quick}
      <div class="section-title">Where we are</div>
      <div class="card pad">
        <div style="font-size:13.5px;line-height:1.7">
        <strong>Sponsor room:</strong> W306AB · OCCC West<br>
        <strong>Meeting room:</strong> Hyatt Gulf Conference Room<br>
        <strong>Customer event:</strong> EPCOT Mexico Vista · Mon 8–10 PM</div>
      </div>`;
    bindGo(el); return;
  }

  const d=dayMeta(tk);
  // next Dell session today
  const now=new Date(); const nowMin=now.getHours()*60+now.getMinutes();
  const todays=SCHEDULE.filter(e=>e.day===tk).sort((a,b)=>mins(a.start)-mins(b.start));
  const dellToday=todays.filter(e=>e.stream.startsWith("dell"));
  const next=todays.find(e=>mins(e.start)>=nowMin) || null;

  el.innerHTML=`
    <div class="card now-hero">
      <div class="now-day">${d.full}</div>
      <div class="now-sub">Today at a glance</div>
      ${d.note?`<div class="now-note">★ ${esc(d.note)}</div>`:""}
      <div class="now-grid">
        <div class="fact"><div class="l">Room W306AB</div><div class="v">${esc(d.roomHours)}</div></div>
        <div class="fact"><div class="l">Expo / Hub</div><div class="v">${esc(d.expo)}</div></div>
        ${d.mainstage?`<div class="fact full"><div class="l">Mainstage</div><div class="v">${esc(d.mainstage)}</div></div>`:""}
        ${d.lunch?`<div class="fact"><div class="l">Lunch</div><div class="v">${esc(d.lunch)}</div></div>`:""}
        <div class="fact"><div class="l">Meeting room</div><div class="v">${esc(d.meetings)}</div></div>
        <div class="fact"><div class="l">Dell sessions today</div><div class="v">${dellToday.length}</div></div>
      </div>
      ${next?`<div class="next-up"><div class="l">Next up</div><div class="t">${esc(next.title)}</div>
        <div class="d">${esc(next.time)} · ${esc(STREAMS[next.stream].short)}${next.where?" · "+esc(next.where):""}</div></div>`:""}
    </div>
    ${quick}`;
  bindGo(el);
}

/* ---------- SCHEDULE ---------- */
function renderDayTabs(){
  const el=document.getElementById("daytabs");
  el.innerHTML=DAYS.map(d=>`<button class="${d.key===state.day?"on":""}" data-day="${d.key}">
    ${d.tab}<span class="dnum">${d.date.slice(8)}</span></button>`).join("");
  el.querySelectorAll("button").forEach(b=>b.onclick=()=>{ state.day=b.dataset.day; renderSchedule(); });
}
function renderStreamFilters(){
  const el=document.getElementById("streamfilters");
  let html=Object.entries(STREAMS).map(([k,s])=>{
    const on=!state.streamOff.has(k);
    return `<button class="chip ${on?"on":""}" data-stream="${k}" style="${on?`background:${s.color}`:""}">
      <span class="sw" style="background:${on?"#fff":s.color}"></span>${s.short}</button>`;
  }).join("");
  html+=`<button class="chip mine ${state.mineOnly?"on":""}" id="minechip">★ My sessions</button>`;
  el.innerHTML=html;
  el.querySelectorAll("[data-stream]").forEach(b=>b.onclick=()=>{
    const k=b.dataset.stream;
    if(state.streamOff.has(k)) state.streamOff.delete(k); else state.streamOff.add(k);
    renderSchedule();
  });
  document.getElementById("minechip").onclick=()=>{
    state.mineOnly=!state.mineOnly;
    document.getElementById("namebar").classList.toggle("show", state.mineOnly);
    renderSchedule();
  };
}
function renderNameChips(){
  const el=document.getElementById("namechips");
  el.style.display = state.mineOnly ? "flex" : "none";
  el.innerHTML=TEAM.map(n=>`<button class="${state.name===n?"on":""}" data-n="${n}">${n}</button>`).join("");
  el.querySelectorAll("button").forEach(b=>b.onclick=()=>{
    state.name = (state.name===b.dataset.n)? "" : b.dataset.n;
    document.getElementById("nameinput").value=state.name;
    persist(); renderNameChips(); renderSchedule(); renderMyHeaderName();
  });
}
document.getElementById("nameinput").addEventListener("input",e=>{
  state.name=e.target.value.trim(); persist(); renderNameChips(); renderSchedule(); renderMyHeaderName();
});

function evCard(ev){
  const s=STREAMS[ev.stream];
  const isSaved=state.saved.has(ev.id), isCk=state.checked.has(ev.id);
  const mine=matchesMine(ev);
  const link = ev.link && ev.link.url && ev.link.url!=="#"
    ? `<a href="${ev.link.url}" target="_blank" rel="noopener">${esc(ev.link.label)} ↗</a>` : "";
  const linkText = ev.link && ev.link.url==="#" ? `<span style="font-size:12px;color:var(--muted)">${esc(ev.link.label)}</span>` : "";
  return `<div class="ev ${mine?"mine-hit":""}" data-id="${ev.id}">
    <div class="bar" style="background:${s.color}"></div>
    <div class="body">
      <div class="row1">
        <span class="time">${esc(ev.time)}</span>
        <span class="stream" style="color:${s.color};background:${s.color}14">${esc(s.short)}</span>
      </div>
      <div class="title">${esc(ev.title)}</div>
      ${ev.where?`<div class="where">📍 ${esc(ev.where)}</div>`:""}
      ${ev.who?`<div class="who">${esc(ev.who)}</div>`:""}
      <div class="caret">tap for details ›</div>
      <div class="detail">
        ${ev.desc?`<div class="desc">${esc(ev.desc)}</div>`:""}
        <div class="acts">
          <button class="save ${isSaved?"saved":""}" data-act="save">${isSaved?"✓ In My Show":"＋ My Show"}</button>
          <button class="check ${isCk?"checked":""}" data-act="check">${isCk?"✓ Done":"○ Mark done"}</button>
          ${link}${linkText}
        </div>
      </div>
    </div></div>`;
}
function renderSchedule(){
  renderDayTabs(); renderStreamFilters(); renderNameChips();
  const list=document.getElementById("schedlist");
  let evs=SCHEDULE.filter(e=>e.day===state.day)
    .filter(e=>!state.streamOff.has(e.stream))
    .filter(e=> state.mineOnly ? matchesMine(e) : true)
    .sort((a,b)=>mins(a.start)-mins(b.start) || a.title.localeCompare(b.title));
  if(!evs.length){
    list.innerHTML=`<div class="empty">${state.mineOnly && !state.name
      ? "Pick your name above to see your sessions."
      : "Nothing matches these filters for "+dayMeta(state.day).tab+"."}</div>`;
    return;
  }
  list.innerHTML=evs.map(evCard).join("");
  list.querySelectorAll(".ev").forEach(card=>{
    const id=card.dataset.id;
    card.querySelector(".body").addEventListener("click",e=>{
      if(e.target.closest(".acts")||e.target.closest("a")) return;
      card.classList.toggle("open");
    });
    const sv=card.querySelector('[data-act="save"]'); if(sv) sv.onclick=()=>{ toggle(state.saved,id); persist(); renderSchedule(); updateMyCount(); };
    const ck=card.querySelector('[data-act="check"]'); if(ck) ck.onclick=()=>{ toggle(state.checked,id); persist(); renderSchedule(); };
  });
}
function toggle(set,id){ if(set.has(id)) set.delete(id); else set.add(id); }

/* ---------- LOGISTICS ---------- */
function renderLog(){
  const el=document.getElementById("s-log");
  const venues=VENUES.map(v=>`<div class="card pad venue lblock">
    <div class="name">${esc(v.name)}</div>
    <div class="where">${esc(v.where)}</div>
    <div class="hours">${esc(v.hours)}</div>
    <div class="note">${esc(v.note)}</div></div>`).join("");
  const contacts=`<div class="card pad">${CONTACTS.map(c=>`<div class="contact">
    <div><div class="n">${esc(c.name)}</div><div class="r">${esc(c.role)}</div></div>
    ${c.detail?`<div class="d">${esc(c.detail)}</div>`:""}</div>`).join("")}</div>`;
  const links=`<div class="card pad">${LINKS.map(l=>`<a class="linkrow" href="${l.url}" target="_blank" rel="noopener">
    <span class="dot"></span><span><span class="lk">${esc(l.label)}</span>${l.note?`<br><span class="nt">${esc(l.note)}</span>`:""}</span>
    <span class="go">↗</span></a>`).join("")}</div>`;
  const g=MEETING_GUIDE;
  const guide=`<div class="card pad"><details class="guide">
    <summary>Customer meetings — quick guidance</summary>
    <h4>Why schedule one</h4><ul>${g.why.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>
    <h4>When to postpone</h4><ul>${g.postpone.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>
    <h4>Bring to the request</h4><ul>${g.bring.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>
    <div class="ct">${esc(g.contact)}</div>
  </details></div>`;
  const notes = NOTES.length? `<div class="section-title">Good to know</div>
    <div class="card pad">${NOTES.map(n=>`<div class="note-line">${esc(n)}</div>`).join("")}</div>`:"";
  el.innerHTML=`<div class="section-title">Venues</div>${venues}
    <div class="section-title">Meetings</div>${guide}
    <div class="section-title">Key contacts</div>${contacts}
    <div class="section-title">Links</div>${links}${notes}`;
}

/* ---------- MY SHOW ---------- */
function renderMyHeaderName(){ const i=document.getElementById("myname"); if(i && i.value!==state.name) i.value=state.name; }
function savedEntries(){
  return SCHEDULE.filter(e=>state.saved.has(e.id))
    .sort((a,b)=>DAYS.findIndex(d=>d.key===a.day)-DAYS.findIndex(d=>d.key===b.day) || mins(a.start)-mins(b.start));
}
function renderMy(){
  const el=document.getElementById("s-my");
  const hi = state.name? `Good to see you, ${esc(state.name.split(" ")[0])}.` : "Your show";
  const saved=savedEntries();

  let body="";
  if(!saved.length && !state.custom.length){
    body=`<div class="my-empty">Nothing saved yet.<br>Open <strong>Schedule</strong>, tap a session, and hit <strong>＋ My Show</strong> to build your plan — then add your own to-dos below.</div>`;
  }else{
    let cur=null, parts=[];
    saved.forEach(e=>{
      if(e.day!==cur){ cur=e.day; parts.push(`<div class="mygroup">${dayMeta(cur).full}</div>`); }
      const done=state.checked.has(e.id);
      const note=state.notes[e.id]||"";
      parts.push(`<div class="myitem ${done?"done":""}" data-id="${e.id}">
        <button class="chk ${done?"on":""}" data-act="chk">${done?"✓":""}</button>
        <div class="mi-body">
          <div class="mi-time">${esc(e.time)} · ${esc(STREAMS[e.stream].short)}</div>
          <div class="mi-title">${esc(e.title)}</div>
          ${e.where?`<div class="mi-where">📍 ${esc(e.where)}</div>`:""}
          <textarea placeholder="Add a note…" data-note>${esc(note)}</textarea>
        </div>
        <button class="rm" data-act="unsave" title="Remove">×</button>
      </div>`);
    });
    body=parts.join("");
    if(state.custom.length){
      body+=`<div class="mygroup">My to-dos</div>`;
      state.custom.forEach(c=>{
        body+=`<div class="myitem ${c.done?"done":""}" data-cid="${c.id}">
          <button class="chk ${c.done?"on":""}" data-act="cchk">${c.done?"✓":""}</button>
          <div class="mi-body">
            ${c.when?`<div class="mi-time">${esc(c.when)}</div>`:""}
            <div class="mi-title">${esc(c.title)}</div>
          </div>
          <button class="rm" data-act="cdel" title="Remove">×</button></div>`;
      });
    }
  }

  el.innerHTML=`
    <div class="card myhead">
      <div class="hi">${hi}</div>
      <div class="sub">Your saved sessions, check-offs, notes, and to-dos. Saved on this device.</div>
      <input id="myname" placeholder="Your name" value="${esc(state.name)}" autocomplete="off">
      <div class="addbox">
        <input id="addtitle" placeholder="Add your own to-do…">
        <button id="addbtn">Add</button>
      </div>
    </div>
    ${body}
    <div class="my-actions">
      <button id="copybtn">Copy my list</button>
      <button id="printbtn">Print</button>
    </div>`;

  document.getElementById("myname").addEventListener("input",e=>{
    state.name=e.target.value.trim(); persist();
    document.getElementById("nameinput").value=state.name; renderNameChips(); renderSchedule();
  });
  const addT=document.getElementById("addtitle");
  function add(){ const v=addT.value.trim(); if(!v) return;
    state.custom.push({id:"c"+Date.now(), title:v, when:"", done:false}); addT.value=""; persist(); renderMy(); updateMyCount(); }
  document.getElementById("addbtn").onclick=add;
  addT.addEventListener("keydown",e=>{ if(e.key==="Enter") add(); });

  el.querySelectorAll(".myitem").forEach(it=>{
    const id=it.dataset.id, cid=it.dataset.cid;
    const chk=it.querySelector('[data-act="chk"]'); if(chk) chk.onclick=()=>{ toggle(state.checked,id); persist(); renderMy(); };
    const un=it.querySelector('[data-act="unsave"]'); if(un) un.onclick=()=>{ state.saved.delete(id); persist(); renderMy(); updateMyCount(); };
    const ta=it.querySelector("[data-note]"); if(ta) ta.addEventListener("input",e=>{ state.notes[id]=e.target.value; persist(); });
    const cchk=it.querySelector('[data-act="cchk"]'); if(cchk) cchk.onclick=()=>{ const c=state.custom.find(x=>x.id===cid); c.done=!c.done; persist(); renderMy(); };
    const cdel=it.querySelector('[data-act="cdel"]'); if(cdel) cdel.onclick=()=>{ state.custom=state.custom.filter(x=>x.id!==cid); persist(); renderMy(); updateMyCount(); };
  });

  document.getElementById("copybtn").onclick=copyList;
  document.getElementById("printbtn").onclick=()=>window.print();
}
function listText(){
  let lines=[`My ISTELive 26 — ${state.name||""}`.trim(),""];
  let cur=null;
  savedEntries().forEach(e=>{
    if(e.day!==cur){ cur=e.day; lines.push(dayMeta(cur).full); }
    const done=state.checked.has(e.id)?"[x]":"[ ]";
    lines.push(`  ${done} ${e.time} · ${e.title}${e.where?" — "+e.where:""}`);
    if(state.notes[e.id]) lines.push(`        note: ${state.notes[e.id]}`);
  });
  if(state.custom.length){ lines.push("","My to-dos");
    state.custom.forEach(c=>lines.push(`  ${c.done?"[x]":"[ ]"} ${c.title}`)); }
  return lines.join("\n");
}
function copyList(){
  const t=listText();
  navigator.clipboard?.writeText(t).then(
    ()=>flash("Copied your list"),
    ()=>fallbackCopy(t)
  ) || fallbackCopy(t);
}
function fallbackCopy(t){ const ta=document.createElement("textarea"); ta.value=t; document.body.appendChild(ta); ta.select();
  try{document.execCommand("copy"); flash("Copied your list");}catch(e){flash("Press ⌘/Ctrl+C to copy");} ta.remove(); }
function flash(msg){
  const f=document.createElement("div"); f.textContent=msg;
  f.style.cssText="position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 16px;border-radius:99px;font-size:13px;font-weight:600;z-index:60;box-shadow:var(--shadow)";
  document.body.appendChild(f); setTimeout(()=>f.remove(),1600);
}

/* ---------- counts + nav ---------- */
function updateMyCount(){
  const n=state.saved.size+state.custom.length;
  const b=document.getElementById("myct");
  if(n>0){ b.style.display="flex"; b.textContent=n; } else b.style.display="none";
}
function show(screen){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("s-"+screen).classList.add("active");
  document.querySelectorAll(".bottomnav button").forEach(b=>b.classList.toggle("on",b.dataset.go===screen));
  window.scrollTo({top:0,behavior:"instant"});
  if(screen==="now") renderNow();
  if(screen==="sched") renderSchedule();
  if(screen==="log") renderLog();
  if(screen==="my") renderMy();
}
function bindGo(scope){ (scope||document).querySelectorAll("[data-go]").forEach(b=>{
  b.addEventListener("click",e=>{ e.preventDefault(); show(b.dataset.go); }); }); }
document.querySelectorAll(".bottomnav button").forEach(b=>b.addEventListener("click",()=>show(b.dataset.go)));

/* ---------- boot ---------- */
function renderAll(){
  // default schedule day = today if in range, else Sunday
  state.day = todayKey() || "sun";
  document.getElementById("nameinput").value=state.name;
  renderNow(); renderSchedule(); renderLog(); renderMy();
  updateMyCount();
  show("now");
}
</script>
</body>
</html>
