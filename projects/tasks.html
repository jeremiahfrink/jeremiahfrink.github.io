const IconCalendar = ({size,color}) => <svg width={size||16} height={size||16} viewBox="0 0 24 24" fill="none" stroke={color||"currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
const IconStar = ({size,color,filled}) => <svg width={size||16} height={size||16} viewBox="0 0 24 24" fill={filled ? (color||"currentColor") : "none"} stroke={color||"currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;

/* ---- Constants ---- */
const STATUSES = ["Not Started", "In Progress", "Waiting", "Done"];
const PRIORITIES = ["", "High", "Medium", "Low"];
const TIME_ESTIMATES = ["", "Quick (< 15 min)", "Short (< 1 hr)", "Medium (1-2 hrs)", "Long (2-4 hrs)"];
const TIME_ORDER = ["Quick (< 15 min)", "Short (< 1 hr)", "Medium (1-2 hrs)", "Long (2-4 hrs)"];
const TIME_SHORT = { "Quick (< 15 min)": "Quick", "Short (< 1 hr)": "Short", "Medium (1-2 hrs)": "Medium", "Long (2-4 hrs)": "Long" };
const TIME_COLORS = {
  "Quick (< 15 min)": { bg: "#dcfce7", text: "#166534", dot: "#22c55e", desc: "Under 15 minutes" },
  "Short (< 1 hr)": { bg: "#dbeafe", text: "#1e40af", dot: "#3b82f6", desc: "Under an hour" },
  "Medium (1-2 hrs)": { bg: "#fef3c7", text: "#92400e", dot: "#f59e0b", desc: "1 to 2 hours" },
  "Long (2-4 hrs)": { bg: "#fee2e2", text: "#991b1b", dot: "#ef4444", desc: "Half day block" },
};
const STATUS_COLORS = {
  "Not Started": { bg: "#f1f5f9", text: "#475569", dot: "#94a3b8" },
  "In Progress": { bg: "#dbeafe", text: "#1e40af", dot: "#3b82f6" },
  "Waiting": { bg: "#fef3c7", text: "#92400e", dot: "#f59e0b" },
  "Done": { bg: "#dcfce7", text: "#166534", dot: "#22c55e" },
};
const PRIORITY_COLORS = {
  High: { bg: "#fee2e2", text: "#991b1b" },
  Medium: { bg: "#fef3c7", text: "#92400e" },
  Low: { bg: "#dbeafe", text: "#1e40af" },
};
const TAG_PALETTE = [
  { bg: "#ede9fe", text: "#5b21b6" }, { bg: "#dbeafe", text: "#1e40af" },
  { bg: "#ccfbf1", text: "#115e59" }, { bg: "#fce7f3", text: "#9d174d" },
  { bg: "#fef3c7", text: "#92400e" }, { bg: "#e0e7ff", text: "#3730a3" },
  { bg: "#dcfce7", text: "#166534" }, { bg: "#fee2e2", text: "#991b1b" },
  { bg: "#f3e8ff", text: "#6b21a8" }, { bg: "#cffafe", text: "#155e75" },
  { bg: "#fef9c3", text: "#854d0e" }, { bg: "#f1f5f9", text: "#334155" },
];
function hashStr(s) { let h = 0; for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0; return Math.abs(h); }
function getProjectColor(name) { return TAG_PALETTE[hashStr(name) % TAG_PALETTE.length]; }

/* ---- CSV Helpers ---- */
function parseCSVLine(line) {
  const r = []; let cur = "", inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inQ) { if (c === '"' && line[i + 1] === '"') { cur += '"'; i++; } else if (c === '"') inQ = false; else cur += c; }
    else { if (c === '"') inQ = true; else if (c === ",") { r.push(cur); cur = ""; } else cur += c; }
  }
  r.push(cur); return r;
}
function parseCSV(text) {
  const lines = text.trim().replace(/\r\n/g, "\n").split("\n");
  if (lines.length < 2) return [];
  const hdr = parseCSVLine(lines[0]).map(h => h.trim());
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const vals = parseCSVLine(line);
    const obj = {};
    hdr.forEach((h, i) => (obj[h] = (vals[i] || "").trim()));
    return obj;
  });
}
function parseCSVRaw(text) {
  const lines = text.trim().replace(/\r\n/g, "\n").split("\n");
  if (lines.length < 2) return { headers: [], rows: [] };
  const headers = parseCSVLine(lines[0]).map(h => h.trim());
  const rows = lines.slice(1).filter(l => l.trim()).map(line => parseCSVLine(line));
  return { headers, rows };
}
var STD_FIELDS = ["TaskID", "Project", "Task", "Priority", "Time Estimate", "Due Date", "Status", "Notes", "Archived"];
function headersMatchStandard(headers) {
  // Considered a match if every header is one of our standard fields
  return headers.length > 0 && headers.every(h => STD_FIELDS.indexOf(h) !== -1) && headers.indexOf("Task") !== -1;
}
function flexParseDate(raw) {
  if (!raw) return { value: "", ambiguous: false, failed: false };
  var s = raw.trim();
  // Already ISO
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return { value: s, ambiguous: false, failed: false };
  // Slash or dash numeric: M/D/YYYY or M-D-YYYY (assume US MM/DD)
  var m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if (m) {
    var mo = parseInt(m[1], 10), da = parseInt(m[2], 10), yr = parseInt(m[3], 10);
    if (yr < 100) yr += 2000;
    var ambiguous = (mo <= 12 && da <= 12 && mo !== da);
    if (mo > 12 && da <= 12) { var t = mo; mo = da; da = t; } // clearly DD/MM, swap
    if (mo >= 1 && mo <= 12 && da >= 1 && da <= 31) {
      return { value: yr + "-" + String(mo).padStart(2,"0") + "-" + String(da).padStart(2,"0"), ambiguous: ambiguous, failed: false };
    }
  }
  // Long form: "March 24, 2026" / "Mar 24 2026" / "24 March 2026"
  var parsed = new Date(s);
  if (!isNaN(parsed.getTime())) {
    return { value: parsed.toISOString().slice(0, 10), ambiguous: false, failed: false };
  }
  return { value: "", ambiguous: false, failed: true, raw: s };
}
function escCSV(v) { const s = (v || "").toString(); return s.includes(",") || s.includes('"') || s.includes("\n") ? '"' + s.replace(/"/g, '""') + '"' : s; }
function generateCSV(tasks) {
  const cols = ["TaskID", "Project", "Task", "Priority", "Time Estimate", "Due Date", "Status", "Notes", "Archived"];
  return [cols.join(","), ...tasks.map(t => cols.map(c => escCSV(t[c])).join(","))].join("\n");
}
function nextTaskID(tasks) {
  const nums = tasks.map(t => parseInt((t.TaskID || "").replace("T-", ""), 10)).filter(n => !isNaN(n));
  return "T-" + String((nums.length ? Math.max(...nums) : 0) + 1).padStart(3, "0");
}

/* Date helpers */
function toInternal(d) {
  if (!d) return "";
  if (/^\d{4}-\d{2}-\d{2}$/.test(d)) return d;
  var m = d.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return m[3] + "-" + m[1].padStart(2,"0") + "-" + m[2].padStart(2,"0");
  return d;
}
function toDisplay(d) {
  if (!d) return "";
  var m = d.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (m) return m[2] + "/" + m[3] + "/" + m[1];
  return d;
}
function normalizeTaskDates(tasks) {
  return tasks.map(t => ({ ...t, "Due Date": toInternal(t["Due Date"]) }));
}
function isOverdue(d) {
  if (!d) return false;
  var today = new Date().toISOString().slice(0, 10);
  return d < today;
}
var MAP_TARGETS = ["Task", "Project", "Priority", "Time Estimate", "Due Date", "Status", "Notes", "__skip__", "__notes__"];
function guessTarget(header) {
  var h = header.toLowerCase().trim();
  if (/(^|[^a-z])(task|subject|title|name|to.?do|item)([^a-z]|$)/.test(h)) return "Task";
  if (/(project|list|group|folder|bucket)/.test(h)) return "Project";
  if (/(priority|importance|urgent)/.test(h)) return "Priority";
  if (/(due|deadline|date)/.test(h)) return "Due Date";
  if (/(status|state|progress|complete|done)/.test(h)) return "Status";
  if (/(time|estimate|duration|effort)/.test(h)) return "Time Estimate";
  if (/(note|description|detail|comment|memo)/.test(h)) return "Notes";
  return "__skip__";
}

const firebaseConfig = {

/* ---- Firestore data access ----
   Model:  users/{uid}/tasks/{taskId}        one document per task
           users/{uid}/settings/prefs        scratchpad + starred (synced)
*/
function tasksCol(uid) { return db.collection("users").doc(uid).collection("tasks"); }
function prefsDoc(uid) { return db.collection("users").doc(uid).collection("settings").doc("prefs"); }

// One-time read of every task for this user.
async function loadTasks(uid) {
  const snap = await tasksCol(uid).get();
  return snap.docs.map(d => d.data());
}
// Read the synced prefs (scratchpad + starred). Returns null if none saved yet.
async function loadPrefs(uid) {
  const snap = await prefsDoc(uid).get();
  return snap.exists ? snap.data() : null;
}
// Diff the new tasks array against what Firestore last held and write only what changed.
// `baseline` is a { TaskID: json } map of the last-synced state; returns the next baseline.
async function syncTasks(uid, newTasks, baseline) {
  const col = tasksCol(uid);
  const next = {};
  let batch = db.batch(), ops = 0;
  async function flushIfFull() { if (ops >= 450) { await batch.commit(); batch = db.batch(); ops = 0; } }
  for (const t of newTasks) {
    const json = JSON.stringify(t);
    next[t.TaskID] = json;
    if (baseline[t.TaskID] !== json) { batch.set(col.doc(t.TaskID), t); ops++; await flushIfFull(); }
  }
  for (const id in baseline) {
    if (!(id in next)) { batch.delete(col.doc(id)); ops++; await flushIfFull(); }
  }
  if (ops > 0) await batch.commit();
  return next;
}
function savePrefs(uid, scratchpad, starred) {
  return prefsDoc(uid).set({ scratchpad: scratchpad, starred: starred }, { merge: true });
}

/* ---- One-time migration from the old localStorage version ---- */
// If this browser still holds data from the pre-Firebase build and the account has
// none yet, pull it in once so nothing appears lost. CSV export/import remains the
// reliable cross-device migration path; this is just a convenience safety net.
const OLD_TASKS_KEY = "taskmanager-tasks-v2";
const MIGRATED_FLAG = "taskmanager-migrated-to-firebase";
function readLegacyLocal() {
  try {
    const tasksRaw = localStorage.getItem(OLD_TASKS_KEY);
    const tasks = tasksRaw ? JSON.parse(tasksRaw) : null;
    const note = localStorage.getItem("taskmanager-scratchpad") || "";
    const starRaw = localStorage.getItem("taskmanager-starred");
    const starred = starRaw ? JSON.parse(starRaw) : {};
    return { tasks: tasks, note: note, starred: starred };
  } catch (e) { return { tasks: null, note: "", starred: {} }; }
}

/* ---- Sub-components ---- */
function ProjectPill({ name, count, active, onClick }) {
  const c = name === "All" ? { bg: active ? "#1e293b" : "#f1f5f9", text: active ? "#fff" : "#475569" } : getProjectColor(name);
  const style = name === "All" ? { background: c.bg, color: c.text } : { background: active ? c.text : c.bg, color: active ? "#fff" : c.text };
  return (
    <button onClick={onClick} style={{ ...style, border: "none", borderRadius: 20, padding: "6px 14px", fontSize: 13, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap", transition: "all .15s", fontFamily: "inherit" }}>
      {name} <span style={{ opacity: 0.7, fontWeight: 400, marginLeft: 3 }}>{count}</span>
    </button>
  );
}
function StatusBadge({ status }) {
  const c = STATUS_COLORS[status] || STATUS_COLORS["Not Started"];
  return <span style={{ background: c.bg, color: c.text, padding: "3px 10px", borderRadius: 12, fontSize: 12, fontWeight: 600, whiteSpace: "nowrap" }}>{status}</span>;
}
function PriorityDot({ priority }) {
  if (!priority) return null;
  const c = PRIORITY_COLORS[priority];
  return <span style={{ background: c && c.bg, color: c && c.text, padding: "2px 8px", borderRadius: 10, fontSize: 11, fontWeight: 700 }}>{priority}</span>;
}
function TimeBadge({ time, short: isShort }) {
  if (!time) return <span style={{ color: "#94a3b8", fontSize: 12 }}>—</span>;
  const tc = TIME_COLORS[time];
  if (isShort && tc) return <span style={{ background: tc.bg, color: tc.text, padding: "2px 8px", borderRadius: 10, fontSize: 11, fontWeight: 700 }}>{TIME_SHORT[time]}</span>;
  return <span style={{ color: "#64748b", fontSize: 12 }}>{time}</span>;
}

function Modal({ children, onClose }) {
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.45)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 999, backdropFilter: "blur(2px)" }}>
      <div onClick={e => e.stopPropagation()} style={{ background: "#fff", borderRadius: 16, padding: 28, width: "100%", maxWidth: 520, maxHeight: "90vh", overflow: "auto", boxShadow: "0 24px 48px rgba(0,0,0,.15)", fontFamily: "inherit" }}>
        {children}
      </div>
    </div>
  );
}

function ImportModal({ existingCount, newCount, onReplace, onAdd, onCancel }) {
  return (
    <Modal onClose={onCancel}>
      <div style={{ textAlign: "center", padding: "8px 0" }}>
        <div style={{ width: 56, height: 56, borderRadius: 16, background: "#fef3c7", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px" }}><IconAlert size={28} color="#f59e0b" /></div>
        <h3 style={{ margin: "0 0 8px", fontSize: 18, fontWeight: 700, color: "#0f172a" }}>Import Tasks</h3>
        <p style={{ color: "#64748b", margin: "0 0 8px", lineHeight: 1.5 }}>You have <strong>{existingCount}</strong> existing tasks. The CSV contains <strong>{newCount}</strong> tasks.</p>
        <p style={{ color: "#64748b", margin: "0 0 24px", lineHeight: 1.5, fontSize: 13 }}>Would you like to replace everything or add these as new tasks?</p>
        <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
          <button onClick={onCancel} style={{ background: "#f1f5f9", color: "#475569", border: "none", borderRadius: 10, padding: "10px 20px", fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
          <button onClick={onAdd} style={{ background: "#fff", color: "#4f46e5", border: "1.5px solid #4f46e5", borderRadius: 10, padding: "10px 20px", fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Add to Existing</button>
          <button onClick={onReplace} style={{ background: "#4f46e5", color: "#fff", border: "none", borderRadius: 10, padding: "10px 20px", fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Replace All</button>
        </div>
      </div>
    </Modal>
  );
}

function MappingModal({ headers, rows, onConfirm, onCancel }) {
  const [mapping, setMapping] = useState(() => {
    var init = {};
    headers.forEach(function(h) { init[h] = guessTarget(h); });
    var taskAssigned = false;
    headers.forEach(function(h) {
      if (init[h] === "Task") { if (taskAssigned) init[h] = "__notes__"; else taskAssigned = true; }
    });
    return init;
  });
  const setMap = (h, v) => setMapping(prev => Object.assign({}, prev, { [h]: v }));
  const selectStyle = { width: "100%", padding: "7px 10px", border: "1.5px solid #e2e8f0", borderRadius: 8, fontSize: 13, fontFamily: "inherit", outline: "none", cursor: "pointer", background: "#fff" };
  var hasTask = Object.keys(mapping).some(k => mapping[k] === "Task");
  var targetLabel = { "Task": "Task", "Project": "Project", "Priority": "Priority", "Time Estimate": "Time Estimate", "Due Date": "Due Date", "Status": "Status", "Notes": "Notes", "__skip__": "— Skip —", "__notes__": "Add to Notes" };

  return (
    <Modal onClose={onCancel}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
        <h2 style={{ margin: 0, fontSize: 20, fontWeight: 700, color: "#0f172a" }}>Map Your Columns</h2>

/* ============ MAIN APP ============ */
function TaskManager({ user }) {
  const uid = user.uid;
  const [tasks, setTasks] = useState([]);
  const [view, setView] = useState("list");
  const [projectFilter, setProjectFilter] = useState("All");
  const [modal, setModal] = useState(null);
  const [confirmImportData, setConfirmImportData] = useState(null);
  const [rawImport, setRawImport] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [sortCol, setSortCol] = useState(null);
  const [sortDir, setSortDir] = useState("asc");
  const [collapsed, setCollapsed] = useState({ "unestimated": true, "Quick (< 15 min)": true, "Short (< 1 hr)": true, "Medium (1-2 hrs)": true, "Long (2-4 hrs)": true });
  const [focusSort, setFocusSort] = useState("priority");
  const [upcomingSort, setUpcomingSort] = useState("priority");
  const [upcomingCollapsed, setUpcomingCollapsed] = useState({ "overdue": false, "todayTomorrow": false, "thisWeek": true, "nextFewWeeks": true, "later": true, "noDate": true });
  const [starred, setStarred] = useState({});
  const [hideCompleted, setHideCompleted] = useState(true);
  const [showArchived, setShowArchived] = useState(false);
  const [hiddenProjects, setHiddenProjects] = useState({}); // ephemeral: { project: true } = hidden from "All" view
  const [projPanelOpen, setProjPanelOpen] = useState(false);
  const [selectedIds, setSelectedIds] = useState({}); // ephemeral: { TaskID: true } = selected for bulk edit
  const [bulkDate, setBulkDate] = useState("");
  const [bulkShift, setBulkShift] = useState("");
  const [pwModal, setPwModal] = useState(false);
  const [noteOpen, setNoteOpen] = useState(false);
  const [noteText, setNoteText] = useState("");
  const [loadError, setLoadError] = useState(null);
  const fileRef = useRef(null);
  const baselineRef = useRef({}); // { TaskID: json } — last state known to be in Firestore

  // Load everything for this user once, on sign-in.
  useEffect(() => {
    let cancelled = false;
    setLoaded(false); setLoadError(null);
    (async () => {
      try {
        const [fireTasks, prefs] = await Promise.all([loadTasks(uid), loadPrefs(uid)]);
        if (cancelled) return;

        let initialTasks = fireTasks;
        let initialNote = prefs && typeof prefs.scratchpad === "string" ? prefs.scratchpad : "";
        let initialStar = prefs && prefs.starred ? prefs.starred : {};

        // One-time migration from the old localStorage build on this browser.
        const noRemoteYet = fireTasks.length === 0 && !prefs;
        if (noRemoteYet && !localStorage.getItem(MIGRATED_FLAG)) {
          const legacy = readLegacyLocal();
          if (legacy.tasks && legacy.tasks.length) {
            initialTasks = legacy.tasks;
            initialNote = legacy.note || initialNote;
            initialStar = legacy.starred || initialStar;
          }
        }
        try { localStorage.setItem(MIGRATED_FLAG, "1"); } catch (e) {}

        // Baseline reflects what Firestore actually holds, so any migrated tasks
        // get written up on the first sync below.
        const base = {};
        fireTasks.forEach(t => { base[t.TaskID] = JSON.stringify(t); });
        baselineRef.current = base;

        setTasks(initialTasks);
        setNoteText(initialNote);
        setStarred(initialStar);
        setLoaded(true);
      } catch (e) {
        console.error("Load failed", e);
        if (!cancelled) { setLoadError("Couldn't load your tasks. Check your connection and reload."); setLoaded(true); }
      }
    })();
    return () => { cancelled = true; };
  }, [uid]);

  // Push task changes to Firestore (diffed, only what changed).
  useEffect(() => {
    if (!loaded) return;
    let active = true;
    syncTasks(uid, tasks, baselineRef.current)
      .then(next => { if (active) baselineRef.current = next; })
      .catch(e => console.error("Task sync failed", e));
    return () => { active = false; };
  }, [tasks, loaded, uid]);

  // Push scratchpad + starred to Firestore (debounced so typing doesn't hammer it).
  useEffect(() => {
    if (!loaded) return;
    const h = setTimeout(() => {
      savePrefs(uid, noteText, starred).catch(e => console.error("Prefs save failed", e));
    }, 600);
    return () => clearTimeout(h);
  }, [noteText, starred, loaded, uid]);

  const projects = useMemo(() => [...new Set(tasks.map(t => t.Project).filter(Boolean))].sort(), [tasks]);
  const activeProjects = useMemo(() => projects.filter(p => tasks.some(t => t.Project === p && t.Archived !== "yes")), [projects, tasks]);
  const archivedProjects = useMemo(() => projects.filter(p => tasks.filter(t => t.Project === p).length > 0 && tasks.filter(t => t.Project === p).every(t => t.Archived === "yes")), [projects, tasks]);
  const isArchivedProject = useMemo(() => { var m = {}; archivedProjects.forEach(p => m[p] = true); return m; }, [archivedProjects]);

  const filtered = useMemo(() => {
    let f;
    if (projectFilter === "All") {
      f = tasks.filter(t => t.Archived !== "yes" && !hiddenProjects[t.Project]);
    } else if (isArchivedProject[projectFilter]) {
      f = tasks.filter(t => t.Project === projectFilter);
    } else {
      f = tasks.filter(t => t.Project === projectFilter && t.Archived !== "yes");
    }
    if (view === "list" && sortCol) {
      f = [...f].sort((a, b) => {
        const av = (a[sortCol] || "").toLowerCase(), bv = (b[sortCol] || "").toLowerCase();
        if (av < bv) return sortDir === "asc" ? -1 : 1;
        if (av > bv) return sortDir === "asc" ? 1 : -1;
        return 0;
      });
    }
    return f;
  }, [tasks, projectFilter, sortCol, sortDir, view, isArchivedProject, hiddenProjects]);

  const activeTasks = useMemo(() => filtered.filter(t => t.Status !== "Done"), [filtered]);
  const stats = useMemo(() => {
    const s = { total: filtered.length, done: 0, inProgress: 0, waiting: 0, overdue: 0 };
    filtered.forEach(t => { if (t.Status === "Done") s.done++; else { if (t.Status === "In Progress") s.inProgress++; else if (t.Status === "Waiting") s.waiting++; if (isOverdue(t["Due Date"])) s.overdue++; } });
    return s;
  }, [filtered]);

  function handleSort(col) {
    if (sortCol === col) setSortDir(d => d === "asc" ? "desc" : "asc"); else { setSortCol(col); setSortDir("asc"); }
  }
  function toggleCollapse(key) { setCollapsed(prev => ({ ...prev, [key]: !prev[key] })); }
  function toggleUpcoming(key) { setUpcomingCollapsed(prev => ({ ...prev, [key]: !prev[key] })); }

  function getDateBuckets(taskList) {
    var now = new Date();
    var todayStr = now.toISOString().slice(0, 10);
    var tom = new Date(now); tom.setDate(tom.getDate() + 1);
    var tomStr = tom.toISOString().slice(0, 10);
    var endOfWeek = new Date(now); endOfWeek.setDate(endOfWeek.getDate() + (7 - endOfWeek.getDay()));
    var endOfWeekStr = endOfWeek.toISOString().slice(0, 10);
    var threeWeeks = new Date(now); threeWeeks.setDate(threeWeeks.getDate() + 21);
    var threeWeeksStr = threeWeeks.toISOString().slice(0, 10);

    var buckets = {
      overdue: { label: "Overdue", tasks: [], color: { bg: "#fee2e2", text: "#991b1b", dot: "#dc2626" } },
      todayTomorrow: { label: "Today / Tomorrow", tasks: [], color: { bg: "#fef3c7", text: "#92400e", dot: "#f59e0b" } },
      thisWeek: { label: "This Week", tasks: [], color: { bg: "#dbeafe", text: "#1e40af", dot: "#3b82f6" } },
      nextFewWeeks: { label: "Next Few Weeks", tasks: [], color: { bg: "#e0e7ff", text: "#3730a3", dot: "#6366f1" } },
      later: { label: "Later", tasks: [], color: { bg: "#f1f5f9", text: "#475569", dot: "#94a3b8" } },
      noDate: { label: "No Date Set", tasks: [], color: { bg: "#f3e8ff", text: "#6b21a8", dot: "#a78bfa" } }
    };

    taskList.forEach(function(t) {
      var d = t["Due Date"];
      if (!d) { buckets.noDate.tasks.push(t); }
      else if (d < todayStr) { buckets.overdue.tasks.push(t); }
      else if (d <= tomStr) { buckets.todayTomorrow.tasks.push(t); }
      else if (d <= endOfWeekStr) { buckets.thisWeek.tasks.push(t); }
      else if (d <= threeWeeksStr) { buckets.nextFewWeeks.tasks.push(t); }
      else { buckets.later.tasks.push(t); }
    });
    return buckets;
  }

  function sortUpcomingTasks(taskList) {
    return [...taskList].sort(function(a, b) {
      if (upcomingSort === "dueDate") {
        var da = a["Due Date"] || "9999", db = b["Due Date"] || "9999";
        if (da < db) return -1; if (da > db) return 1;
        var po2 = { High: 0, Medium: 1, Low: 2, "": 3 };
        return (po2[a.Priority] !== undefined ? po2[a.Priority] : 3) - (po2[b.Priority] !== undefined ? po2[b.Priority] : 3);
      }
      var po = { High: 0, Medium: 1, Low: 2, "": 3 };
      var pa = (po[a.Priority] !== undefined ? po[a.Priority] : 3), pb = (po[b.Priority] !== undefined ? po[b.Priority] : 3);
      if (pa !== pb) return pa - pb;
      var da2 = a["Due Date"] || "9999", db2 = b["Due Date"] || "9999";
      if (da2 < db2) return -1; if (da2 > db2) return 1;
      return 0;
    });
  }
  function triggerImport() { fileRef.current && fileRef.current.click(); }
  function handleFileSelect(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      var text = ev.target.result;
      var raw = parseCSVRaw(text);
      if (raw.headers.length === 0) return;
      if (headersMatchStandard(raw.headers)) {
        var parsed = parseCSV(text);
        if (parsed.length) {
          if (tasks.length > 0) setConfirmImportData(parsed);
          else { setTasks(normalizeTaskDates(parsed)); setProjectFilter("All"); }
        }
      } else {
        // Non-standard format → show mapping screen
        setRawImport(raw);
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }
  function applyMapping(mapping) {
    if (!rawImport) return;
    var headers = rawImport.headers, rows = rawImport.rows;
    var noteCols = [];
    headers.forEach(function(h) { if (mapping[h] === "__notes__") noteCols.push(h); });
    var mapped = rows.map(function(vals) {
      var t = { Project: "", Task: "", Priority: "", "Time Estimate": "", "Due Date": "", Status: "", Notes: "", Archived: "" };
      var noteParts = [];
      var dateNote = "";
      headers.forEach(function(h, i) {
        var target = mapping[h];
        var val = (vals[i] || "").trim();
        if (!val) return;
        if (target === "__skip__") return;
        if (target === "__notes__") { noteParts.push(h + ": " + val); return; }
        if (target === "Due Date") {
          var d = flexParseDate(val);
          if (d.failed) { noteParts.push(h + ": " + d.raw); }
          else { t["Due Date"] = d.value; if (d.ambiguous) dateNote = "(date format assumed MM/DD)"; }
          return;
        }
        if (target === "Notes") { noteParts.push(val); return; }
        t[target] = val;
      });
      // Defaults
      if (!t.Project) t.Project = "Imported";
      if (!t.Status) t.Status = "Not Started";
      if (dateNote) noteParts.push(dateNote);
      if (noteParts.length) t.Notes = (t.Notes ? t.Notes + " | " : "") + noteParts.join(" | ");
      return t;
    }).filter(function(t) { return t.Task; });

    // Assign IDs continuing from existing
    var currentMax = 0;
    tasks.forEach(function(t) { var n = parseInt((t.TaskID || "").replace("T-", ""), 10); if (!isNaN(n) && n > currentMax) currentMax = n; });
    var withIds = mapped.map(function(t, i) { return Object.assign({}, t, { TaskID: "T-" + String(currentMax + i + 1).padStart(3, "0") }); });

    setTasks(function(prev) { return prev.concat(withIds); });
    setProjectFilter("All");
    setRawImport(null);
  }

  }

      var withIds = normalized.map(function(t, i) {
        return Object.assign({}, t, { TaskID: "T-" + String(currentMax + i + 1).padStart(3, "0") });
      });
      setTasks(function(prev) { return prev.concat(withIds); });
      setProjectFilter("All");
      setConfirmImportData(null);

                          onMouseLeave={e => e.currentTarget.style.background = restBg}>

                            <input type="checkbox" checked={isSel} onChange={() => toggleSelect(t.TaskID)} style={{ width: 15, height: 15, accentColor: "#4f46e5", cursor: "pointer" }} />
                          </td>
                          <td style={{ padding: "10px 4px", textAlign: "center" }}>
                            <div onClick={e => { e.stopPropagation(); toggleStar(t.TaskID); }} style={{ cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
                              <IconStar size={15} color={isStar ? "#f59e0b" : "#d1d5db"} filled={isStar} />
                            </div>
                          </td>
                          <td style={{ padding: "10px 8px", textAlign: "center" }}>
                            <div onClick={e => { e.stopPropagation(); toggleDone(t.TaskID); }}
                              style={{ width: 20, height: 20, borderRadius: 6, border: isDone ? "none" : "2px solid #cbd5e1", background: isDone ? "#22c55e" : "#fff", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto", transition: "all .15s" }}>
                              {isDone && <IconCheck size={13} color="#fff" sw={3} />}
                            </div>
                          </td>
                          <td onClick={() => setModal({ mode: "edit", task: t })} style={{ padding: "10px 10px" }}><span style={{ background: pc.bg, color: pc.text, padding: "2px 9px", borderRadius: 8, fontSize: 12, fontWeight: 600 }}>{t.Project}</span></td>
                          <td onClick={() => setModal({ mode: "edit", task: t })} style={{ padding: "10px 10px", fontWeight: 500, textDecoration: isDone ? "line-through" : "none", color: isDone ? "#94a3b8" : "#1e293b" }}>{t.Task}</td>
                          <td onClick={() => setModal({ mode: "edit", task: t })} style={{ padding: "10px 10px" }}><PriorityDot priority={t.Priority} /></td>
                          <td onClick={() => setModal({ mode: "edit", task: t })} style={{ padding: "10px 10px" }}><TimeBadge time={t["Time Estimate"]} short /></td>
                          <td onClick={() => setModal({ mode: "edit", task: t })} style={{ padding: "10px 10px", fontSize: 12, color: (t.Status !== "Done" && isOverdue(t["Due Date"])) ? "#dc2626" : "#64748b", fontWeight: (t.Status !== "Done" && isOverdue(t["Due Date"])) ? 700 : 400 }}>{toDisplay(t["Due Date"]) || "—"}{t.Status !== "Done" && isOverdue(t["Due Date"]) && " !"}</td>
                          <td onClick={() => setModal({ mode: "edit", task: t })} style={{ padding: "10px 10px" }}><StatusBadge status={t.Status} /></td>
                        </tr>
                      );
                    })}
                    {listRows.length === 0 && (
                      <tr><td colSpan={9} style={{ padding: 40, textAlign: "center", color: "#94a3b8" }}>No tasks found for this filter.</td></tr>
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* KANBAN VIEW */}
          {view === "kanban" && (
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 14, alignItems: "start" }}>
              {STATUSES.map(status => {
                const cards = filtered.filter(t => t.Status === status);
                const sc = STATUS_COLORS[status];
                return (
                  <div key={status} style={{ background: "#fff", borderRadius: 14, border: "1.5px solid #f1f5f9", minHeight: 200 }}>
                    <div style={{ padding: "14px 16px 10px", borderBottom: "1.5px solid #f8f9fc", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <div style={{ width: 10, height: 10, borderRadius: "50%", background: sc.dot }} />
                        <span style={{ fontWeight: 700, fontSize: 13, color: "#334155" }}>{status}</span>
                      </div>
                      <span style={{ background: sc.bg, color: sc.text, padding: "1px 8px", borderRadius: 10, fontSize: 12, fontWeight: 700 }}>{cards.length}</span>
                    </div>
                    <div style={{ padding: 10 }}>
                      {starredFirst(cards).map(t => <KanbanCard key={t.TaskID} task={t} onClick={() => setModal({ mode: "edit", task: t })} isStarred={!!starred[t.TaskID]} onToggleStar={toggleStar} />)}
                      {cards.length === 0 && <div style={{ padding: 20, textAlign: "center", color: "#cbd5e1", fontSize: 13 }}>No tasks</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* FOCUS / WHAT'S NEXT VIEW */}
          {view === "focus" && (
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              {/* Sort toggle */}
              <div style={{ display: "flex", alignItems: "center", justifyContent: "flex-end", gap: 8 }}>
                <span style={{ fontSize: 12, fontWeight: 600, color: "#94a3b8", textTransform: "uppercase", letterSpacing: "0.03em" }}>Sort by</span>
                <div style={{ background: "#f1f5f9", borderRadius: 10, padding: 3, display: "flex", gap: 2 }}>
                  {[["priority", "Priority"], ["dueDate", "Due Date"]].map(([val, label]) => (
                    <button key={val} onClick={() => setFocusSort(val)} style={{ border: "none", borderRadius: 8, padding: "5px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", transition: "all .15s", background: focusSort === val ? "#fff" : "transparent", color: focusSort === val ? "#4f46e5" : "#64748b", boxShadow: focusSort === val ? "0 1px 3px rgba(0,0,0,.08)" : "none" }}>{label}</button>
                  ))}
                </div>
              </div>

              {(() => {
                const unest = activeTasks.filter(t => !t["Time Estimate"]);
                if (unest.length === 0) return null;
                const isOpen = !collapsed["unestimated"];
                return (
                  <div style={{ background: "#fffbeb", border: "1.5px solid #fde68a", borderRadius: 14, overflow: "hidden" }}>
                    <div onClick={() => toggleCollapse("unestimated")} style={{ padding: "14px 18px", display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer", userSelect: "none" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <IconAlert size={16} color="#f59e0b" />
                        <span style={{ fontWeight: 700, fontSize: 14, color: "#92400e" }}>{unest.length} task{unest.length !== 1 ? "s" : ""} need a time estimate</span>
                      </div>
                      <div style={{ color: "#92400e", transition: "transform .2s", transform: isOpen ? "rotate(0deg)" : "rotate(-90deg)" }}><IconChevronDown size={18} /></div>
                    </div>
                    {isOpen && (
                      <div style={{ padding: "0 18px 14px" }}>
                        <p style={{ fontSize: 12, color: "#92400e", margin: "0 0 10px", opacity: 0.8 }}>Add time estimates so they show up in the right bucket below.</p>
                        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                          {starredFirst(unest).slice(0, 10).map(t => (
                            <FocusCard key={t.TaskID} task={t} onClick={() => setModal({ mode: "edit", task: t })} onToggleDone={toggleDone} isStarred={!!starred[t.TaskID]} onToggleStar={toggleStar} />
                          ))}
                          {unest.length > 10 && <div style={{ textAlign: "center", fontSize: 12, color: "#92400e", padding: 6 }}>+ {unest.length - 10} more — click any task to add a time estimate</div>}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })()}

              {TIME_ORDER.map(bucket => {
                const bucketTasks = filtered.filter(t => t["Time Estimate"] === bucket);
                const active = bucketTasks.filter(t => t.Status !== "Done");
                const done = bucketTasks.filter(t => t.Status === "Done");
                const tc = TIME_COLORS[bucket];
                if (bucketTasks.length === 0) return null;
                const isOpen = !collapsed[bucket];
                return (
                  <div key={bucket} style={{ background: "#fff", borderRadius: 14, border: "1.5px solid #f1f5f9", overflow: "hidden" }}>
                    <div onClick={() => toggleCollapse(bucket)} style={{ padding: "16px 18px", display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer", userSelect: "none", borderBottom: isOpen ? "1.5px solid #f8f9fc" : "none" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <div style={{ width: 12, height: 12, borderRadius: "50%", background: tc.dot }} />
                        <div>
                          <span style={{ fontWeight: 700, fontSize: 15, color: "#1e293b" }}>{TIME_SHORT[bucket]}</span>
                          <span style={{ fontSize: 12, color: "#94a3b8", marginLeft: 8 }}>{tc.desc}</span>
                        </div>
                      </div>
                      <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                        <span style={{ background: tc.bg, color: tc.text, padding: "2px 10px", borderRadius: 10, fontSize: 12, fontWeight: 700 }}>{active.length} active</span>
                        {done.length > 0 && <span style={{ background: STATUS_COLORS["Done"].bg, color: STATUS_COLORS["Done"].text, padding: "2px 10px", borderRadius: 10, fontSize: 12, fontWeight: 700 }}>{done.length} done</span>}
                        <div style={{ color: "#94a3b8", transition: "transform .2s", transform: isOpen ? "rotate(0deg)" : "rotate(-90deg)", marginLeft: 4 }}><IconChevronDown size={18} /></div>
                      </div>
                    </div>
                    {isOpen && (
                      <div style={{ padding: "10px 14px", display: "flex", flexDirection: "column", gap: 6 }}>
                        {starredFirst([...active].sort((a, b) => {
                          if (focusSort === "dueDate") {
                            var da = a["Due Date"] || "9999", db = b["Due Date"] || "9999";
                            if (da < db) return -1; if (da > db) return 1;
                            var po2 = { High: 0, Medium: 1, Low: 2, "": 3 };
                            return (po2[a.Priority] !== undefined ? po2[a.Priority] : 3) - (po2[b.Priority] !== undefined ? po2[b.Priority] : 3);
                          }
                          var po = { High: 0, Medium: 1, Low: 2, "": 3 };
                          return (po[a.Priority] !== undefined ? po[a.Priority] : 3) - (po[b.Priority] !== undefined ? po[b.Priority] : 3);
                        })).map(t => (
                          <FocusCard key={t.TaskID} task={t} onClick={() => setModal({ mode: "edit", task: t })} onToggleDone={toggleDone} isStarred={!!starred[t.TaskID]} onToggleStar={toggleStar} />
                        ))}
                        {starredFirst(done).map(t => (
                          <FocusCard key={t.TaskID} task={t} onClick={() => setModal({ mode: "edit", task: t })} onToggleDone={toggleDone} isStarred={!!starred[t.TaskID]} onToggleStar={toggleStar} />
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
              {activeTasks.length === 0 && filtered.filter(t => t.Status === "Done").length > 0 && (
                <div style={{ textAlign: "center", padding: 40, color: "#22c55e", fontSize: 18, fontWeight: 700 }}>All tasks complete!</div>
              )}
            </div>
          )}

          {/* UPCOMING VIEW */}
          {view === "upcoming" && (
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              {/* Sort toggle */}
              <div style={{ display: "flex", alignItems: "center", justifyContent: "flex-end", gap: 8 }}>
                <span style={{ fontSize: 12, fontWeight: 600, color: "#94a3b8", textTransform: "uppercase", letterSpacing: "0.03em" }}>Sort by</span>
                <div style={{ background: "#f1f5f9", borderRadius: 10, padding: 3, display: "flex", gap: 2 }}>
                  {[["priority", "Priority"], ["dueDate", "Due Date"]].map(([val, label]) => (
                    <button key={val} onClick={() => setUpcomingSort(val)} style={{ border: "none", borderRadius: 8, padding: "5px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", transition: "all .15s", background: upcomingSort === val ? "#fff" : "transparent", color: upcomingSort === val ? "#4f46e5" : "#64748b", boxShadow: upcomingSort === val ? "0 1px 3px rgba(0,0,0,.08)" : "none" }}>{label}</button>
                  ))}
                </div>
              </div>

              {(() => {
                var buckets = getDateBuckets(filtered.filter(t => t.Status !== "Done"));
                var doneTasks = filtered.filter(t => t.Status === "Done");
                var bucketKeys = ["overdue", "todayTomorrow", "thisWeek", "nextFewWeeks", "later", "noDate"];
                return (
                  <>
                    {bucketKeys.map(key => {
                      var b = buckets[key];
                      if (b.tasks.length === 0) return null;
                      var isOpen = !upcomingCollapsed[key];
                      var sorted = starredFirst(sortUpcomingTasks(b.tasks));
                      return (
                        <div key={key} style={{ background: "#fff", borderRadius: 14, border: "1.5px solid #f1f5f9", overflow: "hidden" }}>
                          <div onClick={() => toggleUpcoming(key)} style={{ padding: "16px 18px", display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer", userSelect: "none", borderBottom: isOpen ? "1.5px solid #f8f9fc" : "none" }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                              <div style={{ width: 12, height: 12, borderRadius: "50%", background: b.color.dot }} />
                              <span style={{ fontWeight: 700, fontSize: 15, color: "#1e293b" }}>{b.label}</span>
                            </div>
                            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                              {(() => {
                                var hi = b.tasks.filter(t => t.Priority === "High").length;
                                return (
                                  <>
                                    <span style={{ background: b.color.bg, color: b.color.text, padding: "2px 10px", borderRadius: 10, fontSize: 12, fontWeight: 700 }}>{b.tasks.length} task{b.tasks.length !== 1 ? "s" : ""}</span>
                                    {hi > 0 && <span style={{ background: PRIORITY_COLORS.High.bg, color: PRIORITY_COLORS.High.text, padding: "2px 8px", borderRadius: 10, fontSize: 11, fontWeight: 700 }}>{hi} high</span>}
                                  </>
                                );
                              })()}
                              <div style={{ color: "#94a3b8", transition: "transform .2s", transform: isOpen ? "rotate(0deg)" : "rotate(-90deg)", marginLeft: 4 }}><IconChevronDown size={18} /></div>
                            </div>
                          </div>
                          {isOpen && (
                            <div style={{ padding: "10px 14px", display: "flex", flexDirection: "column", gap: 6 }}>
                              {sorted.map(t => (
                                <FocusCard key={t.TaskID} task={t} onClick={() => setModal({ mode: "edit", task: t })} onToggleDone={toggleDone} isStarred={!!starred[t.TaskID]} onToggleStar={toggleStar} />
                              ))}
                            </div>
                          )}
                        </div>
                      );
                    })}
                    {doneTasks.length > 0 && (
                      <div style={{ textAlign: "center", padding: 12, color: "#94a3b8", fontSize: 13 }}>
                        <span style={{ color: STATUS_COLORS["Done"].dot }}>✓</span> {doneTasks.length} completed task{doneTasks.length !== 1 ? "s" : ""} hidden
                      </div>
                    )}
                    {filtered.filter(t => t.Status !== "Done").length === 0 && doneTasks.length > 0 && (
                      <div style={{ textAlign: "center", padding: 40, color: "#22c55e", fontSize: 18, fontWeight: 700 }}>All tasks complete!</div>
                    )}
                  </>
                );
              })()}
            </div>
          )}
        </div>
      )}

      {/* Edit/Add Modal */}
      {modal && (
        <Modal onClose={() => setModal(null)}>
          <TaskForm task={modal.mode === "edit" ? modal.task : {}} onSave={handleSave} onDelete={handleDelete} onClose={() => setModal(null)} projects={activeProjects} />
        </Modal>
      )}

      {/* Import Confirmation */}
      {confirmImportData && (
        <ImportModal
          existingCount={tasks.length}
          newCount={confirmImportData.length}
          onReplace={handleImportReplace}
          onAdd={handleImportAdd}
          onCancel={() => setConfirmImportData(null)}
        />
      )}

      {rawImport && (
        <MappingModal
          headers={rawImport.headers}
          rows={rawImport.rows}
          onConfirm={applyMapping}
          onCancel={() => setRawImport(null)}
        />
      )}

      {/* Scratchpad Panel */}
      {pwModal && <PasswordLinkModal user={user} onClose={() => setPwModal(false)} />}
      {noteOpen && <div className="no-print" onClick={() => setNoteOpen(false)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.15)", zIndex: 900 }} />}
      <div className="no-print" style={{
        position: "fixed", top: 0, right: 0, height: "100vh", width: 340, maxWidth: "90vw",
        background: "#fff", boxShadow: noteOpen ? "-8px 0 24px rgba(0,0,0,.1)" : "none",
        transform: noteOpen ? "translateX(0)" : "translateX(100%)",
        transition: "transform .25s ease", zIndex: 901,
        display: "flex", flexDirection: "column", fontFamily: "inherit"
      }}>
        <div style={{ padding: "18px 20px 14px", borderBottom: "1.5px solid #f1f5f9", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <IconStickyNote size={18} color="#6366f1" />
            <span style={{ fontWeight: 700, fontSize: 15, color: "#0f172a" }}>Scratchpad</span>
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            {noteText.trim() && <button onClick={() => { if (confirm("Clear your scratchpad?")) setNoteText(""); }} style={{ background: "none", border: "1px solid #e2e8f0", borderRadius: 8, padding: "4px 10px", fontSize: 11, fontWeight: 600, color: "#94a3b8", cursor: "pointer", fontFamily: "inherit" }}>Clear</button>}
            <button onClick={() => setNoteOpen(false)} style={{ background: "none", border: "none", cursor: "pointer", color: "#94a3b8", padding: 2 }}><IconX size={18} /></button>
          </div>
        </div>
        <div style={{ padding: "14px 20px 8px" }}>
          <p style={{ fontSize: 12, color: "#94a3b8", margin: "0 0 4px" }}>Jot down your plan for the day. Use "- " to create bullet points.</p>
        </div>
        <div style={{ flex: 1, padding: "0 20px 20px", display: "flex", flexDirection: "column", gap: 12, overflow: "hidden" }}>
          <textarea
            value={noteText}
            onChange={e => setNoteText(e.target.value)}
            placeholder={"- Review AIReady emails\n- Prep Monday webinar deck\n- Follow up with Italy after lunch\n- Block calendar for deep work"}
            style={{
              flex: 1, width: "100%", padding: 14, border: "1.5px solid #e2e8f0", borderRadius: 12,
              fontSize: 14, fontFamily: "'DM Sans', sans-serif", lineHeight: 1.7, resize: "none",
              outline: "none", color: "#1e293b", background: "#fafbff", boxSizing: "border-box"
            }}
            onFocus={e => e.target.style.borderColor = "#6366f1"}
            onBlur={e => e.target.style.borderColor = "#e2e8f0"}
          />
        </div>
      </div>
    </div>
  );
}

/* ---- Set / link a password so the account can sign in with email+password (reliable on mobile) ---- */
function PasswordLinkModal({ user, onClose }) {
  const hasPassword = (user.providerData || []).some(p => p.providerId === "password");
  const [pw, setPw] = useState("");
  const [pw2, setPw2] = useState("");
  const [err, setErr] = useState("");
  const [ok, setOk] = useState(false);
  const [busy, setBusy] = useState(false);

  async function submit() {
    setErr("");
    if (pw.length < 6) { setErr("Password must be at least 6 characters."); return; }
    if (pw !== pw2) { setErr("The two passwords don't match."); return; }
    setBusy(true);
    try {
      if (hasPassword) {
        await auth.currentUser.updatePassword(pw);
      } else {
        const cred = firebase.auth.EmailAuthProvider.credential(user.email, pw);
        await auth.currentUser.linkWithCredential(cred);
      }
      setOk(true);
    } catch (e) {
      if (e.code === "auth/requires-recent-login") setErr("For security this needs a fresh login. Sign out, sign back in with Google, then try again right away.");
      else if (e.code === "auth/email-already-in-use") setErr("A separate password account already exists for this email.");
      else if (e.code === "auth/weak-password") setErr("Use at least 6 characters.");
      else setErr(e.message || "Couldn't set the password.");
    }
    setBusy(false);
  }

  const inputStyle = { width: "100%", padding: "11px 13px", border: "1.5px solid #e2e8f0", borderRadius: 10, fontSize: 14, fontFamily: "inherit", color: "#1e293b", background: "#fafbff", outline: "none", boxSizing: "border-box" };

  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(15,23,42,.35)", zIndex: 950, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div onClick={e => e.stopPropagation()} style={{ background: "#fff", borderRadius: 18, border: "1.5px solid #f1f5f9", boxShadow: "0 24px 48px rgba(15,23,42,.18)", padding: 28, width: "100%", maxWidth: 400, fontFamily: "'DM Sans', sans-serif" }}>
        {ok ? (
          <div>
            <div style={{ width: 48, height: 48, borderRadius: 14, background: "#dcfce7", display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 14 }}>
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#16a34a" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <h2 style={{ margin: "0 0 8px", fontSize: 19, fontWeight: 800, color: "#0f172a" }}>Password set</h2>
            <p style={{ margin: "0 0 20px", fontSize: 14, color: "#475569", lineHeight: 1.5 }}>
              On your phone, sign in with <b>{user.email}</b> and the password you just chose. It's the same account — all your tasks will be there.
            </p>
            <button onClick={onClose} style={{ width: "100%", background: "#4f46e5", color: "#fff", border: "none", borderRadius: 10, padding: "12px", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>Done</button>
          </div>
        ) : (
          <div>
            <h2 style={{ margin: "0 0 6px", fontSize: 19, fontWeight: 800, color: "#0f172a" }}>{hasPassword ? "Change your password" : "Set a password for mobile"}</h2>
            <p style={{ margin: "0 0 18px", fontSize: 14, color: "#64748b", lineHeight: 1.5 }}>
              {hasPassword ? "Update the password used for email sign-in." : "This adds a password to your current account so you can sign in on your phone with email + password — no Google popup needed. Same account, same tasks."}
            </p>
            <div style={{ marginBottom: 10 }}>
              <label style={{ fontSize: 12, fontWeight: 600, color: "#94a3b8" }}>Email</label>
              <input value={user.email || ""} readOnly style={{ ...inputStyle, marginTop: 4, background: "#f1f5f9", color: "#64748b" }} />
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <input type="password" placeholder="New password (min 6 characters)" value={pw} autoComplete="new-password" onChange={e => setPw(e.target.value)} style={inputStyle} />
              <input type="password" placeholder="Confirm password" value={pw2} autoComplete="new-password" onChange={e => setPw2(e.target.value)} onKeyDown={e => { if (e.key === "Enter") submit(); }} style={inputStyle} />
            </div>
            {err && <div style={{ marginTop: 12, background: "#fef2f2", border: "1px solid #fecaca", color: "#b91c1c", borderRadius: 8, padding: "8px 12px", fontSize: 13, fontWeight: 500, lineHeight: 1.4 }}>{err}</div>}
            <div style={{ display: "flex", gap: 10, marginTop: 18 }}>
              <button onClick={onClose} style={{ flex: 1, background: "#f1f5f9", color: "#475569", border: "none", borderRadius: 10, padding: "12px", fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
              <button onClick={submit} disabled={busy} style={{ flex: 1, background: "#4f46e5", color: "#fff", border: "none", borderRadius: 10, padding: "12px", fontSize: 14, fontWeight: 700, cursor: busy ? "default" : "pointer", opacity: busy ? 0.6 : 1, fontFamily: "inherit" }}>{busy ? "Saving…" : (hasPassword ? "Update" : "Set password")}</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ---- Sign in ---- */
function GoogleG({ size = 18 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 48 48">
      <path fill="#4285F4" d="M45.12 24.5c0-1.56-.14-3.06-.4-4.5H24v8.51h11.84c-.51 2.75-2.06 5.08-4.39 6.64v5.52h7.11c4.16-3.83 6.56-9.47 6.56-16.17z"/>
      <path fill="#34A853" d="M24 46c5.94 0 10.92-1.97 14.56-5.33l-7.11-5.52c-1.97 1.32-4.49 2.1-7.45 2.1-5.73 0-10.58-3.87-12.31-9.07H4.34v5.7C7.96 41.07 15.4 46 24 46z"/>
      <path fill="#FBBC05" d="M11.69 28.18C11.25 26.86 11 25.45 11 24s.25-2.86.69-4.18v-5.7H4.34C2.85 17.09 2 20.45 2 24s.85 6.91 2.34 9.88l7.35-5.7z"/>
      <path fill="#EA4335" d="M24 10.75c3.23 0 6.13 1.11 8.41 3.29l6.31-6.31C34.91 4.18 29.93 2 24 2 15.4 2 7.96 6.93 4.34 14.12l7.35 5.7c1.73-5.2 6.58-9.07 12.31-9.07z"/>
    </svg>
  );
}

function SignIn() {
  const [mode, setMode] = useState("signin"); // "signin" | "register"
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);

  function friendlyError(code) {
    const map = {
      "auth/invalid-email": "That email doesn't look right.",
      "auth/user-not-found": "No account with that email. Create one below.",
      "auth/wrong-password": "Wrong password. Try again.",
      "auth/invalid-credential": "Email or password is incorrect.",
      "auth/email-already-in-use": "That email already has an account. Sign in instead.",
      "auth/weak-password": "Use at least 6 characters for your password.",
      "auth/popup-closed-by-user": "Google sign-in was cancelled.",
      "auth/popup-blocked": "Your browser blocked the popup. Allow popups and retry.",
      "auth/network-request-failed": "Network problem. Check your connection."
    };
    return map[code] || "Something went wrong. Try again.";
  }

  async function doEmail() {
    if (!email.trim() || !pw) { setErr("Enter your email and password."); return; }
    setBusy(true); setErr("");
    try {
      if (mode === "register") await auth.createUserWithEmailAndPassword(email.trim(), pw);
      else await auth.signInWithEmailAndPassword(email.trim(), pw);
    } catch (e) { setErr(friendlyError(e.code)); }
    setBusy(false);
  }
  useEffect(() => {
    // Complete a redirect-based Google sign-in and surface any error it returned.
    auth.getRedirectResult().catch(e => setErr(friendlyError(e.code)));
  }, []);

  async function doGoogle() {
    setBusy(true); setErr("");
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      provider.setCustomParameters({ prompt: "select_account" });
      await auth.signInWithRedirect(provider); // redirects away; nothing after this runs
    } catch (e) { setErr(friendlyError(e.code)); setBusy(false); }
  }

  const inputStyle = { width: "100%", padding: "11px 13px", border: "1.5px solid #e2e8f0", borderRadius: 10, fontSize: 14, fontFamily: "inherit", color: "#1e293b", background: "#fafbff", outline: "none", boxSizing: "border-box" };

  return (
    <div style={{ minHeight: "100vh", background: "#f8f9fc", display: "flex", alignItems: "center", justifyContent: "center", padding: 20, fontFamily: "'DM Sans', sans-serif" }}>
      <div style={{ width: "100%", maxWidth: 380, background: "#fff", borderRadius: 18, border: "1.5px solid #f1f5f9", boxShadow: "0 24px 48px rgba(15,23,42,.08)", padding: 32 }}>
        <h1 style={{ margin: "0 0 4px", fontSize: 22, fontWeight: 800, color: "#0f172a", letterSpacing: "-0.02em" }}>
          <span style={{ color: "#6366f1" }}>▪</span> Task Manager
        </h1>
        <p style={{ margin: "0 0 22px", color: "#94a3b8", fontSize: 14, fontWeight: 500 }}>
          {mode === "register" ? "Create an account to sync across your devices." : "Sign in to reach your tasks on any device."}
        </p>

        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          <input type="email" placeholder="Email" value={email} autoComplete="email"
            onChange={e => setEmail(e.target.value)} onKeyDown={e => { if (e.key === "Enter") doEmail(); }} style={inputStyle} />
          <input type="password" placeholder="Password" value={pw} autoComplete={mode === "register" ? "new-password" : "current-password"}
            onChange={e => setPw(e.target.value)} onKeyDown={e => { if (e.key === "Enter") doEmail(); }} style={inputStyle} />
        </div>

        {err && <div style={{ marginTop: 12, background: "#fef2f2", border: "1px solid #fecaca", color: "#b91c1c", borderRadius: 8, padding: "8px 12px", fontSize: 13, fontWeight: 500 }}>{err}</div>}

        <button onClick={doEmail} disabled={busy} style={{ marginTop: 16, width: "100%", background: "#4f46e5", color: "#fff", border: "none", borderRadius: 10, padding: "12px", fontSize: 14, fontWeight: 700, cursor: busy ? "default" : "pointer", opacity: busy ? 0.6 : 1, fontFamily: "inherit" }}>
          {busy ? "Working…" : (mode === "register" ? "Create account" : "Sign in")}
        </button>

        <div style={{ display: "flex", alignItems: "center", gap: 10, margin: "18px 0" }}>
          <div style={{ flex: 1, height: 1, background: "#e2e8f0" }} />
          <span style={{ fontSize: 12, color: "#cbd5e1", fontWeight: 600 }}>or</span>
          <div style={{ flex: 1, height: 1, background: "#e2e8f0" }} />
        </div>

        <button onClick={doGoogle} disabled={busy} style={{ width: "100%", background: "#fff", color: "#1e293b", border: "1.5px solid #e2e8f0", borderRadius: 10, padding: "11px", fontSize: 14, fontWeight: 600, cursor: busy ? "default" : "pointer", opacity: busy ? 0.6 : 1, fontFamily: "inherit", display: "flex", alignItems: "center", justifyContent: "center", gap: 10 }}>
          <GoogleG /> Continue with Google
        </button>

        <div style={{ marginTop: 20, textAlign: "center", fontSize: 13, color: "#64748b" }}>
          {mode === "register" ? "Already have an account? " : "New here? "}
          <button onClick={() => { setMode(mode === "register" ? "signin" : "register"); setErr(""); }} style={{ background: "none", border: "none", color: "#4f46e5", fontWeight: 700, cursor: "pointer", fontFamily: "inherit", fontSize: 13 }}>
            {mode === "register" ? "Sign in" : "Create one"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ---- Auth gate: decides between the sign-in screen and the app ---- */
function AuthGate() {
  const [user, setUser] = useState(undefined); // undefined = checking, null = signed out
  useEffect(() => auth.onAuthStateChanged(u => setUser(u || null)), []);

  if (user === undefined) {
    return (
      <div style={{ minHeight: "100vh", background: "#f8f9fc", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'DM Sans', sans-serif" }}>
        <div style={{ width: 34, height: 34, border: "3px solid #e2e8f0", borderTopColor: "#4f46e5", borderRadius: "50%", animation: "tmspin 0.8s linear infinite" }} />
        <style>{"@keyframes tmspin{to{transform:rotate(360deg)}}"}</style>
      </div>
    );
  }
  if (!user) return <SignIn />;
  // key={user.uid} guarantees a clean remount (fresh state + reload) when the account changes.
  return <TaskManager key={user.uid} user={user} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<AuthGate />);
</script>
</body>
